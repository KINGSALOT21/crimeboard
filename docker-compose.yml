services:
  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: crimeboard
      POSTGRES_DB: crimeboard
    ports:
      - "5544:5432"
    volumes:
      - crimeboard-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    restart: on-failure
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: crimeboard
      DB_NAME: crimeboard
      CLIENT_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  crimeboard-data: